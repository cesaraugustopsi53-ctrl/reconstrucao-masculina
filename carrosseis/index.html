<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrosséis — @cesaraugustoo__</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#080f0b;color:#fff;font-family:-apple-system,sans-serif;padding:24px 16px 60px}
  h1{font-size:20px;color:#C9A84C;margin-bottom:4px}
  .sub{color:#445;font-size:13px;margin-bottom:32px}
  .carrossel{margin-bottom:52px}
  .carrossel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #192618}
  .carrossel-header h2{font-size:13px;font-weight:600;color:#7a9e82;letter-spacing:.05em;text-transform:uppercase}
  .btn-todos{background:#C9A84C;color:#080f0b;font-weight:700;font-size:12px;padding:8px 16px;border-radius:5px;text-decoration:none;letter-spacing:.04em;white-space:nowrap;cursor:pointer;border:none}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .card{position:relative;border-radius:5px;overflow:hidden;background:#111a13}
  .card img{width:100%;display:block}
  .num{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.7);color:#C9A84C;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.06em}
  .btn-dl{display:block;background:#0f1c12;color:#C9A84C;text-align:center;font-weight:600;font-size:12px;padding:9px;text-decoration:none;letter-spacing:.04em;border-top:1px solid #1e3222}
</style>
</head>
<body>

<h1>@cesaraugustoo__</h1>
<p class="sub">Carrosséis prontos para postar</p>

<!-- ── CARROSSEL: EGO FRÁGIL v3 ── -->
<div class="carrossel" id="ego-fragil">
  <div class="carrossel-header">
    <h2>Ego Frágil</h2>
    <button class="btn-todos" onclick="baixarTodos('ego-fragil-v4', 11)">Baixar todos</button>
  </div>
  <div class="grid">
    <div class="card"><span class="num">01</span><img src="ego-fragil-v4/slide-01.png" loading="lazy"><a class="btn-dl" href="ego-fragil-v4/slide-01.png" download>Baixar</a></div>
    <div class="card"><span class="num">02</span><img src="ego-fragil-v4/slide-02.png" loading="lazy"><a class="btn-dl" href="ego-fragil-v4/slide-02.png" download>Baixar</a></div>
    <div class="card"><span class="num">03</span><img src="ego-fragil-v4/slide-03.png" loading="lazy"><a class="btn-dl" href="ego-fragil-v4/slide-03.png" download>Baixar</a></div>
    <div class="card"><span class="num">04</span><img src="ego-fragil-v4/slide-04.png" loading="lazy"><a class="btn-dl" href="ego-fragil-v4/slide-04.png" download>Baixar</a></div>
    <div class="card"><span class="num">05</span><img src="ego-fragil-v4/slide-05.png" loading="lazy"><a class="btn-dl" href="ego-fragil-v4/slide-05.png" download>Baixar</a></div>
    <div class="card"><span class="num">06</span><img src="ego-fragil-v4/slide-06.png" loading="lazy"><a class="btn-dl" href="ego-fragil-v4/slide-06.png" download>Baixar</a></div>
    <div class="card"><span class="num">07</span><img src="ego-fragil-v4/slide-07.png" loading="lazy"><a class="btn-dl" href="ego-fragil-v4/slide-07.png" download>Baixar</a></div>
    <div class="card"><span class="num">08</span><img src="ego-fragil-v4/slide-08.png" loading="lazy"><a class="btn-dl" href="ego-fragil-v4/slide-08.png" download>Baixar</a></div>
    <div class="card"><span class="num">09</span><img src="ego-fragil-v4/slide-09.png" loading="lazy"><a class="btn-dl" href="ego-fragil-v4/slide-09.png" download>Baixar</a></div>
    <div class="card"><span class="num">10</span><img src="ego-fragil-v4/slide-10.png" loading="lazy"><a class="btn-dl" href="ego-fragil-v4/slide-10.png" download>Baixar</a></div>
    <div class="card"><span class="num">11</span><img src="ego-fragil-v4/slide-11.png" loading="lazy"><a class="btn-dl" href="ego-fragil-v4/slide-11.png" download>Baixar</a></div>
  </div>
</div>

<script>
async function baixarTodos(pasta, total) {
  const btn = event.target;
  btn.textContent = 'Baixando...';
  btn.disabled = true;
  for (let i = 1; i <= total; i++) {
    const num = String(i).padStart(2,'0');
    const url = `${pasta}/slide-${num}.png`;
    const a = document.createElement('a');
    a.href = url;
    a.download = `cesaraugustoo-slide-${num}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    await new Promise(r => setTimeout(r, 800));
  }
  btn.textContent = 'Baixar todos';
  btn.disabled = false;
}
</script>

</body>
</html>
